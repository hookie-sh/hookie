# Build and release the Hookie CLI. Trigger: push tag v* (e.g. v1.0.0).
# Requires CLERK_PUBLISHABLE_KEY in the environment (e.g. GitHub Actions secret).
# The workflow must build the GUI and copy apps/gui/dist to cli/internal/gui/dist before running goreleaser.

version: 2

project_name: hookie

changelog:
  use: github
  format: "{{ .Message }}{{ if .Logins }} ({{ .Logins | englishJoin }}){{ end }}"
  sort: asc
  abbrev: -1
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999

builds:
  - id: hookie
    dir: cli
    main: .
    binary: hookie
    ldflags:
      - -s -w
      - -X github.com/hookie-sh/hookie/cli/internal/auth.PublishableKey={{ .Env.CLERK_PUBLISHABLE_KEY }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # Skip windows/arm64 (not a common target)
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: hookie
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if eq .Os \"windows\" }}.zip{{ else }}.tar.gz{{ end }}"

checksum:
  name_template: checksums.txt

release:
  github:
    owner: hookie-sh
    name: hookie
