# Build and release the Hookie CLI on tag push (e.g. v1.0.0).
# Requires CLERK_PUBLISHABLE_KEY to be set in repo Actions secrets.
name: Release CLI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build GUI (embedded in CLI)
        run: |
          pnpm --filter gui build
          rm -rf cli/internal/gui/dist
          cp -r apps/gui/dist cli/internal/gui/dist

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set npm package version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          pnpm --filter @hookie/cli exec -- npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Publish @hookie-sh/hookie to npm
        run: pnpm publish --filter @hookie-sh/hookie --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
