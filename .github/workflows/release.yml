# Build and release the Hookie CLI on tag push (e.g. v1.0.0).
# Publishes: GoReleaser artifacts to GitHub Release, 5 platform packages to npm, then main @hookie-sh/hookie.
# Requires CLERK_PUBLISHABLE_KEY and NPM_AUTH_TOKEN in repo Actions secrets.
name: Release CLI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build GUI (embedded in CLI)
        run: |
          pnpm --filter gui build
          rm -rf cli/internal/gui/dist
          cp -r apps/gui/dist cli/internal/gui/dist

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish platform packages to npm
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node packages/hookie-cli/scripts/publish-platform-packages.js "$VERSION" dist
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

      - name: Set main package version and optionalDependencies from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd packages/hookie-cli
          node -e "
            const v = process.env.VERSION.replace(/^v/, '');
            const pkg = require('./package.json');
            pkg.version = v;
            for (const k of Object.keys(pkg.optionalDependencies || {})) {
              pkg.optionalDependencies[k] = v;
            }
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
        env:
          VERSION: ${{ github.ref_name }}

      - name: Publish @hookie-sh/hookie to npm
        run: pnpm publish --filter @hookie-sh/hookie --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
