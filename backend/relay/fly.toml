# fly.toml app configuration file generated for hookie on 2025-11-07T04:35:51Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'hookie-relay'
primary_region = 'sjc'

[build]
  [build.args]
    GO_VERSION = '1.22'

[env]
  PORT = '50051'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[[services]]
  internal_port = 50051
  protocol = "tcp"
  
  [[services.ports]]
    port = 443
    handlers = ["tls"]
  
  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "1s"
