syntax = "proto3";

package relay;

option go_package = "github.com/hookie-sh/hookie/backend/relay/proto;proto";

// Relay service for streaming webhook events
service RelayService {
  // Subscribe to webhook events for an application and/or topics
  // First message must be SubscribeRequest to establish subscription
  // Subsequent messages should be Ready to signal readiness for next event
  rpc Subscribe(stream SubscribeMessage) returns (stream Event);
  
  // List applications for the authenticated user
  rpc ListApplications(ListApplicationsRequest) returns (ListApplicationsResponse);
  
  // List topics for a specific application, or all topics across all accessible applications
  rpc ListTopics(ListTopicsRequest) returns (ListTopicsResponse);
  
  // Create an anonymous ephemeral channel (no auth required)
  rpc CreateAnonymousChannel(CreateAnonymousChannelRequest) returns (CreateAnonymousChannelResponse);
}

// Request to subscribe to events
// Exactly one of app_id, topic_id, or org_id must be provided:
// - topic_id: Subscribe to events for a specific topic
// - app_id: Subscribe to events for all topics in an application
// - org_id: Subscribe to events for all applications and topics in an organization
message SubscribeRequest {
  // Application ID (optional, mutually exclusive with topic_id and org_id)
  string app_id = 1;
  
  // Topic ID (optional, mutually exclusive with app_id and org_id)
  // If provided, subscribes to events for this specific topic
  string topic_id = 2;
  
  // Organization ID (optional, mutually exclusive with app_id and topic_id)
  // If provided, subscribes to events for all applications and topics in this organization
  string org_id = 3;
  
  // Machine ID (required) - unique identifier for the client machine
  string machine_id = 4;
}

// Webhook event message
message Event {
  // HTTP method
  string method = 1;
  
  // Full URL
  string url = 2;
  
  // Request path
  string path = 3;
  
  // Query parameters (JSON string)
  string query = 4;
  
  // Request headers (JSON string)
  string headers = 5;
  
  // Request body (base64 encoded)
  string body = 6;
  
  // Content type
  string content_type = 7;
  
  // Content length
  string content_length = 8;
  
  // Remote address
  string remote_addr = 9;
  
  // Timestamp (nanoseconds since epoch)
  int64 timestamp = 10;
  
  // Application ID
  string app_id = 11;
  
  // Topic ID
  string topic_id = 12;
  
  // Event type: "webhook" for webhook events, "disconnect" for disconnect events
  string event_type = 13;
}

// Request to list applications
message ListApplicationsRequest {
  // Optional: filter by organization ID. If not provided, returns all accessible applications
  string org_id = 1;
}

// Response with list of applications
message ListApplicationsResponse {
  repeated Application applications = 1;
}

// Application message
message Application {
  string id = 1;
  string name = 2;
  string description = 3;
  int64 created_at = 4;
  int64 updated_at = 5;
  int32 topic_count = 6;
}

// Request to list topics
message ListTopicsRequest {
  // Optional: Application ID. If not provided, returns all topics across all accessible applications
  string app_id = 1;
}

// Response with list of topics
message ListTopicsResponse {
  repeated Topic topics = 1;
}

// Topic message
message Topic {
  string id = 1;
  string name = 2;
  string description = 3;
  int64 created_at = 4;
  int64 updated_at = 5;
  string application_id = 6;
}

// Request to create an anonymous ephemeral channel
message CreateAnonymousChannelRequest {
  // Empty - relay reads client IP from the connection/metadata
}

// Response with anonymous channel information
message CreateAnonymousChannelResponse {
  string channel_id = 1;
  string webhook_url = 2;           // e.g. "https://ingest.hookie.sh/anon/anon_xxx"
  int64 expires_at = 3;             // Unix timestamp (seconds)
  AnonymousLimits limits = 4;
}

// Anonymous channel rate limits
message AnonymousLimits {
  int64 requests_per_day = 1;
  int64 requests_per_minute = 2;
  int64 max_payload_bytes = 3;
}

// Message sent from client to relay during Subscribe stream
// First message must be SubscribeRequest, subsequent messages should be Ready
message SubscribeMessage {
  oneof message {
    SubscribeRequest subscribe = 1;
    Ready ready = 2;
  }
}

// Ready signal sent by client to indicate readiness for next event
message Ready {
  // Empty message - just signals readiness
}


