# fly.toml app configuration file generated for hookie-ingest on 2025-11-07T03:51:02Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'hookie-ingest'
primary_region = 'yyz'

[build]
  [build.args]
    GO_VERSION = '1.25'

[env]
  PORT = '4000'

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
